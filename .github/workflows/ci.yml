name: Monorepo CI (multi-project)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  discover-projects:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect projects
        id: set-matrix
        run: |
          projects=$(ls projects | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$projects" >> $GITHUB_OUTPUT

  build:
    needs: discover-projects
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: ${{ fromJson(needs.discover-projects.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: sudo apt update && sudo apt install -y ansible

      - name: Run Ansible build
        run: |
          ansible-playbook \
            -i ansible/inventory \
            ansible/playbook.yml \
            --extra-vars "project_path=projects/${{ matrix.project }}"
